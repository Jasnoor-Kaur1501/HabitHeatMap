<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HabitHeatmap</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Familjen+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f8f7f4;
  --white: #ffffff;
  --border: #e8e4dc;
  --border2: #d8d4cc;
  --ink: #1a1814;
  --muted: #8a8278;
  --dim: #c4beb4;
  --sans: 'Plus Jakarta Sans', sans-serif;
  --display: 'Familjen Grotesk', sans-serif;
}

html, body { min-height: 100%; background: var(--bg); color: var(--ink); font-family: var(--sans); }

/* ── HEADER ── */
header {
  background: var(--white);
  border-bottom: 1px solid var(--border);
  padding: 0 40px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 60px;
  position: sticky;
  top: 0;
  z-index: 10;
}

.logo {
  font-family: var(--display);
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
}

.logo span { color: var(--muted); font-weight: 400; }

.header-right { display: flex; align-items: center; gap: 12px; }

.streak-badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: #fff8e6;
  border: 1px solid #f0d070;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 12px;
  font-weight: 600;
  color: #8a6800;
}

/* ── LAYOUT ── */
.container { max-width: 960px; margin: 0 auto; padding: 36px 24px 80px; }

/* ── HABIT SELECTOR ── */
.habit-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.habit-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--white);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}
.habit-pill:hover { border-color: var(--border2); }
.habit-pill.active { border-color: var(--active-color, #1a1814); background: var(--active-bg, #f0f0f0); color: var(--ink); }
.habit-pill .hp-dot { width: 8px; height: 8px; border-radius: 50%; }
.habit-pill .hp-del { font-size: 14px; color: var(--dim); margin-left: 2px; opacity: 0; transition: opacity 0.15s; }
.habit-pill:hover .hp-del { opacity: 1; }
.habit-pill .hp-del:hover { color: #e05a5a; }

.add-habit-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: transparent;
  border: 1.5px dashed var(--border2);
  border-radius: 20px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.18s;
  font-family: var(--sans);
}
.add-habit-btn:hover { border-color: var(--ink); color: var(--ink); }
/* ADD HABIT FORM */
.add-form {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 24px;
  display: none;
  gap: 12px;
  flex-wrap: wrap;
  align-items: flex-end;
}
.add-form.open { display: flex; }

.af-group { display: flex; flex-direction: column; gap: 5px; }
.af-label { font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }

.af-input {
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--ink);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 400;
  padding: 10px 14px;
  outline: none;
  transition: border-color 0.2s;
}
.af-input:focus { border-color: var(--ink); }
.af-input::placeholder { color: var(--dim); }

/* COLOR SWATCHES */
.color-swatches { display: flex; gap: 6px; }
.cs-swatch {
  width: 26px; height: 26px; border-radius: 50%;
  border: 2px solid transparent;
  cursor: pointer;
  transition: transform 0.15s;
}
.cs-swatch:hover { transform: scale(1.15); }
.cs-swatch.active { border-color: var(--ink); transform: scale(1.1); }

.af-submit {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 20px;
  background: var(--ink);
  border: none;
  border-radius: 10px;
  color: var(--white);
  cursor: pointer;
  transition: all 0.15s;
}
.af-submit:hover { background: #333; }

/* ── MAIN CARD ── */
.main-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  margin-bottom: 20px;
}

.mc-header {
  padding: 24px 28px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 16px;
}

.mc-title {
  font-family: var(--display);
  font-size: 22px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.3px;
  margin-bottom: 4px;
}

.mc-sub {
  font-size: 13px;
  font-weight: 400;
  color: var(--muted);
}

.log-today-btn {
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 600;
  padding: 10px 22px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
  flex-shrink: 0;
}
.log-today-btn.logged {
  background: #e8f5ee;
  color: #1a6b3a;
  border: 1.5px solid #b8dfc8;
}
.log-today-btn.not-logged {
  color: var(--white);
}
.log-today-btn:active { transform: scale(0.97); }
/* STATS BAR */
.stats-bar {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border-bottom: 1px solid var(--border);
}

.sb-item {
  padding: 16px 24px;
  border-right: 1px solid var(--border);
}
.sb-item:last-child { border-right: none; }

.sb-val {
  font-family: var(--display);
  font-size: 26px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.5px;
  margin-bottom: 3px;
}

.sb-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
}

/* HEATMAP */
.heatmap-wrap {
  padding: 24px 28px 28px;
  overflow-x: auto;
}

.heatmap-months {
  display: flex;
  gap: 0;
  margin-bottom: 4px;
  padding-left: 28px;
}

.hm-month {
  font-size: 10px;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  flex: none;
}

.heatmap-body { display: flex; gap: 0; align-items: flex-start; }

.hm-days-col {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-right: 4px;
  flex-shrink: 0;
}

.hm-day-label {
  font-size: 9px;
  font-weight: 500;
  color: var(--dim);
  letter-spacing: 0.06em;
  height: 11px;
  line-height: 11px;
  width: 20px;
  text-align: right;
}

.hm-grid {
  display: flex;
  gap: 2px;
}

.hm-week {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.hm-cell {
  width: 11px;
  height: 11px;
  border-radius: 2px;
  background: #ede9e0;
  cursor: pointer;
  transition: transform 0.1s, filter 0.1s;
  position: relative;
  flex-shrink: 0;
}
.hm-cell:hover { transform: scale(1.4); filter: brightness(0.85); z-index: 2; }
.hm-cell.empty { cursor: default; background: transparent; }
.hm-cell.today { outline: 1.5px solid var(--ink); outline-offset: 1px; }

/* TOOLTIP */
.hm-cell .cell-tip {
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--ink);
  color: var(--white);
  font-size: 10px;
  font-family: var(--sans);
  font-weight: 500;
  padding: 4px 8px;
  border-radius: 5px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s;
  z-index: 10;
}
.hm-cell:hover .cell-tip { opacity: 1; }

/* LEGEND */
.heatmap-legend {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 14px;
  justify-content: flex-end;
}
.hl-label { font-size: 10px; font-weight: 500; color: var(--muted); }
.hl-cell {
  width: 11px; height: 11px; border-radius: 2px;
}

/* STATS GRID */
.stats-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
}

.stat-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 20px 22px;
}

.sc-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
}

.sc-bar-item {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.sc-bar-item:last-child { margin-bottom: 0; }

.sc-bar-name { font-size: 12px; font-weight: 500; color: var(--ink); min-width: 24px; }
.sc-bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 5px; overflow: hidden; }
.sc-bar-fill { height: 100%; border-radius: 5px; transition: width 0.8s ease; width: 0%; }
.sc-bar-val { font-size: 11px; font-weight: 500; color: var(--muted); min-width: 20px; text-align: right; }

.week-day-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.wd-item { text-align: center; }
.wd-label { font-size: 9px; font-weight: 600; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; }
.wd-bar { height: 40px; background: var(--bg); border-radius: 4px; display: flex; align-items: flex-end; overflow: hidden; }
.wd-bar-fill { width: 100%; border-radius: 4px; transition: height 0.8s ease; height: 0%; }
.wd-count { font-size: 10px; font-weight: 600; color: var(--muted); margin-top: 4px; }


/* EMPTY STATE */
.empty-state {
  padding: 60px 28px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}
.es-icon { font-size: 40px; margin-bottom: 4px; }
.es-title { font-family: var(--display); font-size: 18px; font-weight: 600; color: var(--ink); }
.es-sub { font-size: 13px; color: var(--muted); }

@media (max-width: 640px) {
  header { padding: 0 16px; }
  .container { padding: 24px 12px 60px; }
  .mc-header { flex-direction: column; gap: 12px; }
  .stats-bar { grid-template-columns: 1fr 1fr; }
  .sb-item:nth-child(2) { border-right: none; }
  .stats-grid { grid-template-columns: 1fr; }
  .heatmap-wrap { padding: 16px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">Habit<span>Heatmap</span></div>
  <div class="header-right">
    <div class="streak-badge" id="streakBadge" style="display:none">🔥 <span id="streakNum">0</span> day streak</div>
  </div>
</header>

<div class="container">

  <!-- HABIT PILLS -->
  <div class="habit-row" id="habitRow">
    <button class="add-habit-btn" onclick="toggleAddForm()">+ add habit</button>
  </div>

  <!-- ADD FORM -->
  <div class="add-form" id="addForm">
    <div class="af-group">
      <div class="af-label">Habit name</div>
      <input class="af-input" type="text" id="afName" placeholder="e.g. meditate, journal, workout" style="width:200px" maxlength="24" />
    </div>
    <div class="af-group">
      <div class="af-label">Icon</div>
      <input class="af-input" type="text" id="afIcon" placeholder="🧘" style="width:72px; font-size:20px; text-align:center" maxlength="2" />
    </div>
    <div class="af-group">
      <div class="af-label">Color</div>
      <div class="color-swatches" id="colorSwatches"></div>
    </div>
    <button class="af-submit" onclick="createHabit()">Create →</button>
    <button class="af-submit" style="background:transparent;color:var(--muted);border:1px solid var(--border)" onclick="toggleAddForm()">Cancel</button>
  </div>

  <!-- MAIN CARD -->
  <div class="main-card" id="mainCard">
    <div class="empty-state" id="emptyState">
      <div class="es-icon">🌱</div>
      <div class="es-title">No habits yet</div>
      <div class="es-sub">Add your first habit above to start tracking</div>
    </div>
    <div id="habitView" style="display:none">
      <div class="mc-header">
        <div>
          <div class="mc-title" id="mcTitle">—</div>
          <div class="mc-sub" id="mcSub">—</div>
        </div>
        <button class="log-today-btn" id="logBtn" onclick="toggleToday()">—</button>
      </div>
      <div class="stats-bar">
        <div class="sb-item"><div class="sb-val" id="sbTotal">0</div><div class="sb-label">Total days</div></div>
        <div class="sb-item"><div class="sb-val" id="sbStreak">0</div><div class="sb-label">Current streak</div></div>
        <div class="sb-item"><div class="sb-val" id="sbBest">0</div><div class="sb-label">Best streak</div></div>
        <div class="sb-item"><div class="sb-val" id="sbRate">0%</div><div class="sb-label">This month</div></div>
      </div>
      <div class="heatmap-wrap">
        <div class="heatmap-months" id="hmMonths"></div>
        <div class="heatmap-body">
          <div class="hm-days-col" id="hmDaysCol"></div>
          <div class="hm-grid" id="hmGrid"></div>
        </div>
        <div class="heatmap-legend">
          <div class="hl-label">Less</div>
          <div class="hl-cell" style="background:#ede9e0"></div>
          <div class="hl-cell" id="leg1"></div>
          <div class="hl-cell" id="leg2"></div>
          <div class="hl-cell" id="leg3"></div>
          <div class="hl-label">More</div>
        </div>
      </div>
    </div>
  </div>

  <!-- STATS GRID -->
  <div class="stats-grid" id="statsGrid" style="display:none">
    <div class="stat-card">
      <div class="sc-label">Best months</div>
      <div id="monthBars"></div>
    </div>
    <div class="stat-card">
      <div class="sc-label">By day of week</div>
      <div class="week-day-grid" id="weekDayGrid"></div>
    </div>
  </div>

</div>

<script>
const COLORS = [
  { hex: "#22c55e", light: "#dcfce7", name: "green" },
  { hex: "#3b82f6", light: "#dbeafe", name: "blue" },
  { hex: "#f59e0b", light: "#fef3c7", name: "amber" },
  { hex: "#ec4899", light: "#fce7f3", name: "pink" },
  { hex: "#8b5cf6", light: "#ede9fe", name: "purple" },
  { hex: "#ef4444", light: "#fee2e2", name: "red" },
  { hex: "#14b8a6", light: "#ccfbf1", name: "teal" },
];

const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

let habits = JSON.parse(localStorage.getItem("habitHeatmap") || "[]");
let activeHabitId = habits.length ? habits[0].id : null;
let selectedColor = COLORS[0];

// ── INIT ──
function init() {
  buildColorSwatches();
  renderHabitPills();
  if (activeHabitId) renderHabit(activeHabitId);
}

function buildColorSwatches() {
  const wrap = document.getElementById("colorSwatches");
  wrap.innerHTML = COLORS.map((c, i) => `
    <div class="cs-swatch ${i===0?"active":""}" style="background:${c.hex}" onclick="selectColor(${i})" data-idx="${i}"></div>
  `).join("");
}

function selectColor(idx) {
  selectedColor = COLORS[idx];
  document.querySelectorAll(".cs-swatch").forEach((s,i) => s.classList.toggle("active", i===idx));
}

// ── HABITS ──
function toggleAddForm() {
  const form = document.getElementById("addForm");
  form.classList.toggle("open");
  if (form.classList.contains("open")) document.getElementById("afName").focus();
}

function createHabit() {
  const name = document.getElementById("afName").value.trim();
  if (!name) { document.getElementById("afName").focus(); return; }
  const icon = document.getElementById("afIcon").value.trim() || "✅";
  const habit = { id: Date.now(), name, icon, color: selectedColor, logs: [] };
  habits.push(habit);
  save();
  activeHabitId = habit.id;
  document.getElementById("afName").value = "";
  document.getElementById("afIcon").value = "";
  document.getElementById("addForm").classList.remove("open");
  renderHabitPills();
  renderHabit(habit.id);
}

function deleteHabit(id, e) {
  e.stopPropagation();
  if (!confirm("Delete this habit and all its data?")) return;
  habits = habits.filter(h => h.id !== id);
  save();
  if (activeHabitId === id) activeHabitId = habits.length ? habits[0].id : null;
  renderHabitPills();
  if (activeHabitId) renderHabit(activeHabitId);
  else showEmpty();
}

function renderHabitPills() {
  const row = document.getElementById("habitRow");
  row.innerHTML = habits.map(h => `
    <div class="habit-pill ${h.id===activeHabitId?"active":""}"
      style="${h.id===activeHabitId ? `--active-color:${h.color.hex};--active-bg:${h.color.light}` : ""}"
      onclick="switchHabit(${h.id})">
      <div class="hp-dot" style="background:${h.color.hex}"></div>
      ${h.icon} ${esc(h.name)}
      <span class="hp-del" onclick="deleteHabit(${h.id}, event)">×</span>
    </div>
  `).join("") + `<button class="add-habit-btn" onclick="toggleAddForm()">+ add habit</button>`;
}

function switchHabit(id) {
  activeHabitId = id;
  renderHabitPills();
  renderHabit(id);
}

function showEmpty() {
  document.getElementById("emptyState").style.display = "flex";
  document.getElementById("habitView").style.display = "none";
  document.getElementById("statsGrid").style.display = "none";
  document.getElementById("streakBadge").style.display = "none";
}

// ── LOG TODAY ──
function toggleToday() {
  const h = getActive();
  if (!h) return;
  const today = todayStr();
  const idx = h.logs.indexOf(today);
  if (idx >= 0) h.logs.splice(idx, 1);
  else h.logs.push(today);
  save();
  renderHabit(h.id);
}

// ── RENDER HABIT ──
function renderHabit(id) {
  const h = habits.find(h => h.id === id);
  if (!h) return;

  document.getElementById("emptyState").style.display = "none";
  document.getElementById("habitView").style.display = "block";
  document.getElementById("statsGrid").style.display = "grid";

  const today = todayStr();
  const isLogged = h.logs.includes(today);

  document.getElementById("mcTitle").textContent = `${h.icon} ${h.name}`;
  document.getElementById("mcSub").textContent = `tracking since ${formatDate(h.logs.length ? [...h.logs].sort()[0] : today)}`;

  const logBtn = document.getElementById("logBtn");
  logBtn.textContent = isLogged ? "✓ logged today" : "log today";
  logBtn.className = "log-today-btn " + (isLogged ? "logged" : "not-logged");
  logBtn.style.background = isLogged ? "" : h.color.hex;

  // Stats
  const streak = calcStreak(h.logs);
  const bestStreak = calcBestStreak(h.logs);
  const thisMonth = calcMonthRate(h.logs);

  document.getElementById("sbTotal").textContent = h.logs.length;
  document.getElementById("sbStreak").textContent = streak;
  document.getElementById("sbBest").textContent = bestStreak;
  document.getElementById("sbRate").textContent = thisMonth + "%";

  const streakBadge = document.getElementById("streakBadge");
  if (streak > 0) {
    streakBadge.style.display = "flex";
    document.getElementById("streakNum").textContent = streak;
  } else {
    streakBadge.style.display = "none";
  }

  // Legend
  const shades = getShades(h.color.hex, 3);
  document.getElementById("leg1").style.background = shades[0];
  document.getElementById("leg2").style.background = shades[1];
  document.getElementById("leg3").style.background = shades[2];

  buildHeatmap(h);
  buildMonthBars(h);
  buildWeekDayGrid(h);
}

// ── HEATMAP ──
function buildHeatmap(h) {
  const grid = document.getElementById("hmGrid");
  const monthsRow = document.getElementById("hmMonths");
  const daysCol = document.getElementById("hmDaysCol");
  const logSet = new Set(h.logs);
  const today = new Date();
  const todayS = todayStr();

  // Go back 52 weeks from today
  const end = new Date(today);
  const start = new Date(today);
  start.setDate(start.getDate() - (52 * 7) + 1);

  // Align to Sunday
  while (start.getDay() !== 0) start.setDate(start.getDate() - 1);

  // Build weeks
  const weeks = [];
  let cur = new Date(start);
  while (cur <= end) {
    const week = [];
    for (let d = 0; d < 7; d++) {
      week.push(new Date(cur));
      cur.setDate(cur.getDate() + 1);
    }
    weeks.push(week);
  }

  // Month labels
  const monthPositions = {};
  weeks.forEach((week, wi) => {
    const firstDay = week[0];
    const m = firstDay.getMonth();
    if (!monthPositions[m] || firstDay.getDate() <= 7) {
      monthPositions[m] = wi;
    }
  });

  monthsRow.innerHTML = "";
  let lastMonth = -1;
  weeks.forEach((_, wi) => {
    const cell = document.createElement("div");
    cell.className = "hm-month";
    cell.style.width = "13px";
    const monthForWeek = Object.entries(monthPositions).find(([m, pos]) => pos === wi);
    if (monthForWeek && parseInt(monthForWeek[0]) !== lastMonth) {
      cell.textContent = MONTHS[parseInt(monthForWeek[0])];
      lastMonth = parseInt(monthForWeek[0]);
    }
    monthsRow.appendChild(cell);
  });

  // Day labels
  daysCol.innerHTML = ["","Mon","","Wed","","Fri",""].map(d =>
    `<div class="hm-day-label">${d}</div>`
  ).join("");

  // Grid
  grid.innerHTML = "";
  weeks.forEach(week => {
    const weekEl = document.createElement("div");
    weekEl.className = "hm-week";
    week.forEach(day => {
      const ds = dateStr(day);
      const isFuture = day > today;
      const cell = document.createElement("div");
      if (isFuture) {
        cell.className = "hm-cell empty";
      } else {
        const logged = logSet.has(ds);
        const isToday = ds === todayS;
        cell.className = "hm-cell" + (isToday ? " today" : "");
        cell.style.background = logged ? h.color.hex : "#ede9e0";
        if (logged) cell.style.opacity = "0.85";
        const tip = document.createElement("div");
        tip.className = "cell-tip";
        tip.textContent = formatDate(ds) + (logged ? " ✓" : "");
        cell.appendChild(tip);
        cell.onclick = () => { toggleDay(h, ds); };
      }
      weekEl.appendChild(cell);
    });
    grid.appendChild(weekEl);
  });
}

function toggleDay(h, ds) {
  const idx = h.logs.indexOf(ds);
  if (idx >= 0) h.logs.splice(idx, 1);
  else h.logs.push(ds);
  save();
  renderHabit(h.id);
}

// ── MONTH BARS ──
function buildMonthBars(h) {
  const logSet = new Set(h.logs);
  const today = new Date();
  const monthCounts = {};
  for (let i = 5; i >= 0; i--) {
    const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`;
    const days = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    let count = 0;
    for (let j = 1; j <= days; j++) {
      const ds = `${key}-${String(j).padStart(2,"0")}`;
      if (logSet.has(ds)) count++;
    }
    monthCounts[MONTHS[d.getMonth()]] = count;
  }

  const max = Math.max(...Object.values(monthCounts), 1);
  const h_color = habits.find(hb => hb.id === activeHabitId)?.color.hex || "#22c55e";

  document.getElementById("monthBars").innerHTML = Object.entries(monthCounts).map(([month, count]) => `
    <div class="sc-bar-item">
      <div class="sc-bar-name">${month}</div>
      <div class="sc-bar-track">
        <div class="sc-bar-fill" style="width:${(count/max)*100}%;background:${h_color}"></div>
      </div>
      <div class="sc-bar-val">${count}d</div>
    </div>
  `).join("");
}

// ── WEEKDAY GRID ──
function buildWeekDayGrid(h) {
  const counts = Array(7).fill(0);
  h.logs.forEach(ds => {
    const d = new Date(ds + "T00:00:00");
    counts[d.getDay()]++;
  });
  const max = Math.max(...counts, 1);
  const h_color = habits.find(hb => hb.id === activeHabitId)?.color.hex || "#22c55e";

  document.getElementById("weekDayGrid").innerHTML = DAYS.map((day, i) => `
    <div class="wd-item">
      <div class="wd-label">${day[0]}</div>
      <div class="wd-bar">
        <div class="wd-bar-fill" style="height:${(counts[i]/max)*100}%;background:${h_color}"></div>
      </div>
      <div class="wd-count">${counts[i]}</div>
    </div>
  `).join("");
}

// ── UTILS ──
function todayStr() { return dateStr(new Date()); }
function dateStr(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
function formatDate(ds) {
  const d = new Date(ds + "T00:00:00");
  return d.toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" });
}

function calcStreak(logs) {
  const set = new Set(logs);
  let streak = 0, d = new Date();
  while (true) {
    if (set.has(dateStr(d))) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function calcBestStreak(logs) {
  if (!logs.length) return 0;
  const sorted = [...logs].sort();
  let best = 1, cur = 1;
  for (let i = 1; i < sorted.length; i++) {
    const prev = new Date(sorted[i-1] + "T00:00:00");
    const curr = new Date(sorted[i] + "T00:00:00");
    const diff = (curr - prev) / 86400000;
    if (diff === 1) { cur++; best = Math.max(best, cur); }
    else cur = 1;
  }
  return best;
}

function calcMonthRate(logs) {
  const now = new Date();
  const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  const daysSoFar = now.getDate();
  const count = logs.filter(l => l.startsWith(month)).length;
  return Math.round((count / daysSoFar) * 100);
}

function getShades(hex, n) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return Array.from({length:n}, (_,i) => {
    const t = (i+1)/(n+1);
    const nr = Math.round(r + (255-r)*(1-t)*0.6);
    const ng = Math.round(g + (255-g)*(1-t)*0.6);
    const nb = Math.round(b + (255-b)*(1-t)*0.6);
    return `rgb(${nr},${ng},${nb})`;
  });
}

function getActive() { return habits.find(h => h.id === activeHabitId); }
function save() { localStorage.setItem("habitHeatmap", JSON.stringify(habits)); }
function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

document.getElementById("afName").addEventListener("keydown", e => { if(e.key==="Enter") createHabit(); });
init();
</script>
